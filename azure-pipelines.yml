# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: SCA
    displayName: 'Stage 1 - SCA (Dependency Scanning)'
    jobs:
      - job: DependencyScan
        displayName: 'OWASP Dependency Check + npm audit'
        continueOnError: true
        steps:
          - task: UseNode@1
            inputs:
              checkLatest: true

          - script: npm install
            displayName: 'Install Dependencies'

          # npm audit - built-in Node.js vulnerability scanner
          - script: |
              echo "======================================"
              echo "Running npm audit..."
              echo "======================================"
              npm audit --json > npm-audit-report.json || true
              npm audit || true
              echo "npm audit complete. See report above."
            displayName: 'npm audit'
            continueOnError: true

          - task: dependency-check-build-task@6
            inputs:
              projectName: 'devsecops-app'
              scanPath: '$(Build.SourcesDirectory)'
              format: 'HTML, JSON, JUNIT'
              uploadReports: true

          # Publish SCA results as artifacts
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'sca-reports'
              publishLocation: 'Container'
            condition: always()

          # Post summary to pipeline
          - script: |
              echo "##vso[task.logissue type=warning]SCA FINDINGS DETECTED - Review dependency vulnerabilities in artifact: sca-reports"
              echo "##vso[task.complete result=SucceededWithIssues]SCA completed with findings"
            displayName: 'Post SCA Warning'
            continueOnError: true

          # STAGE 2: SECRET SCAN
          # Tool: Gitleaks + TruffleHog
          # Purpose: Detect hardcoded secrets, API keys, credentials in code
          # Findings expected: AWS keys, DB passwords, JWT secrets in app.js 

  - stage: SecretScan
    displayName: 'Stage 2 - Secret Scanning'
    dependsOn: SCA
    condition: always()
    jobs:
      - job: SecretDetection
        displayName: 'Gitleaks + TruffleHog Secret Detection'
        continueOnError: true
        steps:
        # Gitleaks - scans git history AND current code for secrets
          - script: |
              echo "======================================"
              echo "Installing Gitleaks..."
              echo "======================================"
              gitleaks detect \
                --source=$(Build.SourcesDirectory) \
                --report-format=json \
                --report-path=gitleaks-report.json \
                --verbose || true




              





