# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: SCA
    displayName: 'Stage 1 - SCA (Dependency Scanning)'
    jobs:
      - job: DependencyScan
        displayName: 'OWASP Dependency Check + npm audit'
        continueOnError: true
        steps:
          - task: UseNode@1
            inputs:
              checkLatest: true

          - script: npm install
            displayName: 'Install Dependencies'

          # npm audit - built-in Node.js vulnerability scanner
          - script: |
              echo "======================================"
              echo "Running npm audit..."
              echo "======================================"
              npm audit --json > npm-audit-report.json || true
              npm audit || true
              echo "npm audit complete. See report above."
            displayName: 'npm audit'
            continueOnError: true

          - task: dependency-check-build-task@6
            inputs:
              projectName: 'devsecops-app'
              scanPath: '$(Build.SourcesDirectory)'
              format: 'HTML, JSON, JUNIT'
              uploadReports: true

          # Publish SCA results as artifacts
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'sca-reports'
              publishLocation: 'Container'
            condition: always()

              





